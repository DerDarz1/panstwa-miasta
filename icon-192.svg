<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b4fcf"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="192" height="96" rx="42" fill="url(#shine)"/>

  <!-- Globe / map icon -->
  <circle cx="96" cy="78" r="38" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3.5"/>
  <!-- Latitude lines -->
  <ellipse cx="96" cy="78" rx="38" ry="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Vertical center line -->
  <line x1="96" y1="40" x2="96" y2="116" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Horizontal center line -->
  <line x1="58" y1="78" x2="134" y2="78" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Small dot - city marker -->
  <circle cx="96" cy="78" r="5" fill="white"/>
  <circle cx="112" cy="65" r="3.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="80" cy="90" r="3.5" fill="rgba(255,255,255,0.85)"/>

  <!-- Text: PM -->
  <text x="96" y="148" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="28" fill="white" text-anchor="middle" letter-spacing="2">PM</text>

  <!-- Subtle bottom text -->
  <text x="96" y="168" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="1">PAŃSTWA MIASTA</text>
</svg>
