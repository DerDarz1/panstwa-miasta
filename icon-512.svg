<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b4fcf"/>
      <stop offset="50%" stop-color="#8b7ff5"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="256" rx="110" fill="url(#shine)"/>

  <!-- Globe -->
  <circle cx="256" cy="210" r="100" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="8"/>
  <!-- Equator -->
  <ellipse cx="256" cy="210" rx="100" ry="36" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="5"/>
  <!-- Upper latitude -->
  <ellipse cx="256" cy="175" rx="72" ry="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5"/>
  <!-- Lower latitude -->
  <ellipse cx="256" cy="245" rx="72" ry="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5"/>
  <!-- Vertical meridian -->
  <line x1="256" y1="110" x2="256" y2="310" stroke="rgba(255,255,255,0.45)" stroke-width="5"/>
  <!-- Horizontal -->
  <line x1="156" y1="210" x2="356" y2="210" stroke="rgba(255,255,255,0.45)" stroke-width="5"/>

  <!-- City markers with glow -->
  <circle cx="256" cy="210" r="10" fill="white" filter="url(#glow)"/>
  <circle cx="300" cy="178" r="7" fill="rgba(255,255,255,0.9)" filter="url(#glow)"/>
  <circle cx="210" cy="238" r="7" fill="rgba(255,255,255,0.9)" filter="url(#glow)"/>
  <circle cx="290" cy="245" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="222" cy="180" r="5" fill="rgba(255,255,255,0.7)"/>

  <!-- PM text -->
  <text x="256" y="390" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle" letter-spacing="6">PM</text>

  <!-- Full name -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">PAŃSTWA MIASTA</text>
</svg>
