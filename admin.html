<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Państwa Miasta</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#07090f; color:#eef2ff; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; padding:24px 16px; }
  h1 { font-size:1.5rem; font-weight:900; margin-bottom:4px; background:linear-gradient(135deg,#5b4fcf,#c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { color:#5d7499; font-size:.85rem; margin-bottom:24px; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-card { background:#0e1117; border:1px solid #1f2d42; border-radius:14px; padding:16px; text-align:center; }
  .stat-val { font-size:2rem; font-weight:900; color:#8b7ff5; }
  .stat-label { font-size:.72rem; color:#5d7499; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-top:4px; }
  .card { background:#0e1117; border:1px solid #1f2d42; border-radius:14px; padding:16px; margin-bottom:16px; }
  .card h2 { font-size:.9rem; font-weight:800; color:#8ba3c7; text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th { background:#151b27; padding:8px 12px; text-align:left; color:#5d7499; font-weight:700; font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid #1f2d42; }
  td { padding:9px 12px; border-bottom:1px solid #1a2535; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(91,79,207,.04); }
  .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.68rem; font-weight:700; }
  .badge-active { background:rgba(14,196,184,.15); color:#0ec4b8; border:1px solid rgba(14,196,184,.3); }
  .badge-done { background:rgba(91,79,207,.15); color:#8b7ff5; border:1px solid rgba(91,79,207,.3); }
  .badge-lobby { background:rgba(246,201,14,.12); color:#f6c90e; border:1px solid rgba(246,201,14,.25); }
  .nick-chip { display:inline-block; background:#151b27; border:1px solid #2d4060; border-radius:20px; padding:3px 9px; font-size:.75rem; margin:2px; }
  .refresh-btn { background:linear-gradient(135deg,#5b4fcf,#8b7ff5); color:#fff; border:none; border-radius:10px; padding:9px 18px; font-size:.85rem; font-weight:700; cursor:pointer; margin-bottom:20px; }
  .refresh-btn:hover { filter:brightness(1.1); }
  .empty { color:#5d7499; font-size:.85rem; text-align:center; padding:20px; }
  #loading { color:#5d7499; text-align:center; padding:40px; font-size:.9rem; }
</style>
</head>
<body>

<h1>📊 Panel Admina</h1>
<p class="sub">Państwa Miasta — statystyki w czasie rzeczywistym</p>

<button class="refresh-btn" onclick="loadData()">🔄 Odśwież</button>

<div class="stats-row">
  <div class="stat-card"><div class="stat-val" id="stat-rooms">—</div><div class="stat-label">Aktywne pokoje</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-players">—</div><div class="stat-label">Graczy online</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-total-nicks">—</div><div class="stat-label">Unikalnych nicków</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-games">—</div><div class="stat-label">Rozegranych gier</div></div>
</div>

<div class="card">
  <h2>🏟️ Aktywne pokoje</h2>
  <div id="rooms-table"><div class="empty">Ładowanie...</div></div>
</div>

<div class="card">
  <h2>👥 Wszyscy gracze (historia)</h2>
  <div id="nicks-table"><div class="empty">Ładowanie...</div></div>
</div>

<div id="loading" style="display:none">Ładowanie danych...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7c4oqrupOt3ksDLntwJXCx7dL8GWMy0w",
  authDomain: "tkt-game.firebaseapp.com",
  databaseURL: "https://tkt-game-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tkt-game",
  storageBucket: "tkt-game.firebasestorage.app",
  messagingSenderId: "295853730610",
  appId: "1:295853730610:web:8034e6e954f1cb2936052b",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const allNicks = new Set();
let totalGames = 0;

window.loadData = async function() {
  document.getElementById('rooms-table').innerHTML = '<div class="empty">Ładowanie...</div>';

  const snap = await get(ref(db, 'pm-rooms'));
  const rooms = snap.val() || {};
  const roomList = Object.entries(rooms);

  // Stats
  let totalPlayers = 0;
  roomList.forEach(([code, room]) => {
    const players = Object.values(room.players || {});
    totalPlayers += players.length;
    players.forEach(p => allNicks.add(p.nick));
    if (room.status === 'scores' || room.round > 0) totalGames++;
  });

  document.getElementById('stat-rooms').textContent = roomList.length;
  document.getElementById('stat-players').textContent = totalPlayers;
  document.getElementById('stat-total-nicks').textContent = allNicks.size;
  document.getElementById('stat-games').textContent = totalGames;

  // Rooms table
  if (roomList.length === 0) {
    document.getElementById('rooms-table').innerHTML = '<div class="empty">Brak aktywnych pokoi</div>';
  } else {
    let html = `<table><thead><tr><th>Kod</th><th>Host</th><th>Status</th><th>Runda</th><th>Gracze</th><th>Czas</th></tr></thead><tbody>`;
    roomList.forEach(([code, room]) => {
      const players = Object.values(room.players || {});
      const statusMap = { lobby:'lobby', 'letter-draw':'losowanie', answering:'odpowiedzi', voting:'głosowanie', scores:'wyniki' };
      const statusClass = { lobby:'badge-lobby', 'letter-draw':'badge-active', answering:'badge-active', voting:'badge-active', scores:'badge-done' };
      const age = room.createdAt ? Math.floor((Date.now() - room.createdAt) / 60000) : '?';
      html += `<tr>
        <td><strong>${code}</strong></td>
        <td>${room.host || '?'}</td>
        <td><span class="badge ${statusClass[room.status] || 'badge-lobby'}">${statusMap[room.status] || room.status}</span></td>
        <td>${room.round || 0} / ${room.config?.maxRounds || '?'}</td>
        <td>${players.map(p => `<span class="nick-chip">${p.nick}</span>`).join('')}</td>
        <td>${age} min temu</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('rooms-table').innerHTML = html;
  }

  // All nicks
  if (allNicks.size === 0) {
    document.getElementById('nicks-table').innerHTML = '<div class="empty">Brak danych</div>';
  } else {
    const sorted = [...allNicks].sort();
    document.getElementById('nicks-table').innerHTML =
      `<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">${sorted.map(n => `<span class="nick-chip">${n}</span>`).join('')}</div>
       <p style="font-size:.72rem;color:#5d7499;margin-top:10px">Łącznie: ${allNicks.size} unikalnych nicków z aktywnych pokoi</p>`;
  }
};

// Auto-refresh co 30s
loadData();
setInterval(loadData, 30000);

// Live listener
onValue(ref(db, 'pm-rooms'), () => loadData());
</script>
</body>
</html>
